name: Tests

on:
  push:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install package and test dependencies
        run: pip install -e ".[test]" pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short -r fEs
